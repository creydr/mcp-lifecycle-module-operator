name: E2E Tests

on:
  pull_request:
    branches: ['*']
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: go install sigs.k8s.io/kind@latest

      - name: Create kind cluster with local registry
        run: make kind-create

      - name: Build and push operator image to local registry
        run: make docker-build docker-push IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=e2e

      - name: Deploy the operator
        run: make deploy IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=e2e

      - name: Apply platform ConfigMap
        run: kubectl apply -f config/samples/platform-config.yaml -n mcp-lifecycle-module-operator-system

      - name: Wait for module operator to be ready
        run: |
          kubectl rollout status deployment/mcp-lifecycle-module-operator-controller-manager \
            -n mcp-lifecycle-module-operator-system --timeout=120s

      - name: Run E2E tests
        run: make e2e-test

      - name: Collect debug info
        if: failure()
        run: |
          echo "=== Module operator logs ==="
          kubectl logs -n mcp-lifecycle-module-operator-system \
            deploy/mcp-lifecycle-module-operator-controller-manager \
            --tail=100 || true
          echo "=== Module operator CR status ==="
          kubectl get mcplifecycleoperators.components.platform.opendatahub.io \
            default -o yaml || true
          echo "=== Operand namespace resources ==="
          kubectl get all -n mcp-lifecycle-operator-system || true
          echo "=== Events ==="
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true